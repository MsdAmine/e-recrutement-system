<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TalentBridge — Find Your Next Opportunity</title>
    <meta name="description" content="TalentBridge connects top talent with great companies. Browse jobs, apply with confidence, and manage your recruitment pipeline." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <script>
      (function () {
        try {
          var key = "talentbridge-theme";
          var stored = window.localStorage.getItem(key);
          var theme = stored === "light" || stored === "dark" ? stored : "light";
          var root = document.documentElement;
          root.classList.toggle("dark", theme === "dark");
          root.style.colorScheme = theme;
        } catch (error) {
          document.documentElement.classList.remove("dark");
          document.documentElement.style.colorScheme = "light";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
